name: Build Installers

on:
  push:
    tags:
      - 'v*' # Dispara quando uma tag de versão (ex: v1.0.0) é criada
  workflow_dispatch: # Permite execução manual pela aba Actions

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "JogoDaLatinha" gerador_cartas.py

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: JogoDaLatinha-Windows
          path: dist/JogoDaLatinha.exe

      - name: Create DEB package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm
          mkdir -p build_deb/usr/bin
          cp dist/JogoDaLatinha build_deb/usr/bin/jogodalatinha
          chmod +x build_deb/usr/bin/jogodalatinha
          fpm -s dir -t deb -n jogodalatinha -v "1.0.0" -C build_deb -p JogoDaLatinha-linux.deb usr/

      - name: Upload Linux DEB Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: JogoDaLatinha-Linux
          path: JogoDaLatinha-linux.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/JogoDaLatinha-Windows/JogoDaLatinha.exe
            artifacts/JogoDaLatinha-Linux/JogoDaLatinha-linux.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
